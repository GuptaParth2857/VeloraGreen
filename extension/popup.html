<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeloraGreen EcoScore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, system-ui, sans-serif;
      background: linear-gradient(135deg, #030712 0%, #064e3b 100%);
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header-text h1 { font-size: 16px; font-weight: 700; }
    .header-text p { font-size: 11px; color: #94a3b8; }
    .score-card {
      text-align: center;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .score {
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .grade-A { color: #22c55e; }
    .grade-B { color: #84cc16; }
    .grade-C { color: #eab308; }
    .grade-D { color: #f97316; }
    .grade-F { color: #ef4444; }
    .score-description { font-size: 13px; color: #94a3b8; }
    .details { 
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .detail-label { color: #94a3b8; }
    .detail-value { color: #e2e8f0; font-weight: 500; }
    .efficiency-details {
      display: none;
      font-size: 12px;
      color: #22c55e;
      padding: 8px 12px;
      background: rgba(34,197,94,0.1);
      border-radius: 8px;
      margin-bottom: 12px;
      line-height: 1.8;
    }
    .tip-section {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .tip-section h3 { font-size: 12px; color: #22c55e; margin-bottom: 4px; }
    .tip-section p { font-size: 12px; color: #94a3b8; line-height: 1.5; }
    .cta {
      display: block;
      text-align: center;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.9; }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #475569;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🌿</div>
    <div class="header-text">
      <h1>VeloraGreen EcoScore</h1>
      <p>Real-time website carbon analysis</p>
    </div>
  </div>

  <div class="score-card">
    <div id="scoreDisplay" class="score grade-A">A+</div>
    <div id="scoreDescription" class="score-description">Analyzing...</div>
  </div>

  <div class="details">
    <div class="detail-row"><span class="detail-label">📦 Page Size</span><span id="pageSize" class="detail-value">-</span></div>
    <div class="detail-row"><span class="detail-label">🔗 Requests</span><span id="requests" class="detail-value">-</span></div>
    <div class="detail-row"><span class="detail-label">📊 Data Transfer</span><span id="dataTransfer" class="detail-value">-</span></div>
    <div class="detail-row"><span class="detail-label">🌍 CO₂ / Visit</span><span id="co2PerVisit" class="detail-value">-</span></div>
  </div>

  <div id="efficiencyDetails" class="efficiency-details"></div>

  <div class="tip-section">
    <h3>💡 Green Tip</h3>
    <p id="tipText">Loading tip...</p>
  </div>

  <a href="https://veloragreen.com" target="_blank" class="cta">🌱 Track Your Full Footprint</a>
  <div class="footer">Powered by VeloraGreen &amp; Gemini AI</div>

  <script src="popup.js"></script>
</body>
</html>

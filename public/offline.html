<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — VeloraGreen</title>
  <meta name="theme-color" content="#22c55e">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #030712;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .leaf { color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>You're Offline</h1>
    <p>VeloraGreen needs an internet connection to calculate your carbon footprint and provide personalized recommendations. Check your connection and try again.</p>
    <button onclick="window.location.reload()" class="btn">Try Again</button>
    <p style="margin-top:1.5rem;font-size:0.875rem;">🌿 Every small step counts toward a greener planet.</p>
  </div>
</body>
</html>
